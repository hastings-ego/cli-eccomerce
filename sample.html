<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Market - Premium E-Commerce Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --accent-light: #ecf0f1;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --border: #bdc3c7;
            --success: #27ae60;
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-dark);
            background: var(--bg-light);
            line-height: 1.6;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 1rem 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        .nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.95rem;
        }

        .nav a:hover {
            color: var(--accent);
        }

        .cart-badge {
            background: var(--accent);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, #34495e 100%);
            color: white;
            padding: 4rem 0;
            text-align: center;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
        }

        .btn-secondary {
            background: var(--accent-light);
            color: var(--primary);
        }

        .btn-secondary:hover {
            background: white;
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            transform: translateY(-4px);
        }

        .product-image {
            width: 100%;
            height: 240px;
            background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #bdc3c7;
        }

        .product-info {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .product-description {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--accent-light);
            padding-top: 1rem;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }

        .stock-status {
            font-size: 0.85rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            background: var(--accent-light);
            color: var(--primary);
        }

        .stock-status.low {
            background: #ffe5e5;
            color: var(--accent);
        }

        .stock-status.out {
            background: #f5f5f5;
            color: var(--text-light);
        }

        .add-to-cart {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .add-to-cart:hover {
            background: #c0392b;
        }

        .add-to-cart:disabled {
            background: var(--text-light);
            cursor: not-allowed;
        }

        .search-bar {
            margin: 2rem 0;
        }

        .search-bar input {
            width: 100%;
            max-width: 500px;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .cart-sidebar {
            position: fixed;
            right: -350px;
            top: 0;
            width: 350px;
            height: 100vh;
            background: white;
            box-shadow: -4px 0 12px rgba(0, 0, 0, 0.15);
            transition: right 0.3s;
            z-index: 200;
            overflow-y: auto;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            background: var(--primary);
            color: white;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-items {
            padding: 1rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--accent-light);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .cart-item-price {
            color: var(--accent);
            font-weight: bold;
        }

        .cart-total {
            padding: 1.5rem;
            border-top: 2px solid var(--primary);
            background: var(--accent-light);
        }

        .total-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .total-amount {
            font-size: 1.8rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .checkout-btn:hover {
            background: #229954;
        }

        .empty-cart {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-light);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 3rem 0;
        }

        .pagination button {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            background: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pagination button.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .pagination button:hover:not(.active) {
            border-color: var(--accent);
        }

        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }

        @media (max-width: 768px) {
            .nav {
                gap: 1rem;
            }

            .hero h1 {
                font-size: 1.8rem;
            }

            .products {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }

            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">Luxe<span>Market</span></div>
            <nav class="nav">
                <a href="#home">Home</a>
                <a href="#products">Products</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
                <a href="#" onclick="toggleCart(); return false;">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cartCount">0</span>
                </a>
            </nav>
        </div>
    </header>

    <div class="hero">
        <div class="container">
            <h1>Welcome to Luxe Market</h1>
            <p>Discover premium products curated just for you</p>
            <button class="btn" onclick="document.getElementById('products').scrollIntoView({behavior: 'smooth'})">
                Shop Now
            </button>
        </div>
    </div>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search products...">
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>Category</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="fashion">Fashion</option>
                    <option value="home">Home & Garden</option>
                    <option value="beauty">Beauty</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Price Range</label>
                <select id="priceFilter">
                    <option value="">All Prices</option>
                    <option value="0-50">$0 - $50</option>
                    <option value="50-100">$50 - $100</option>
                    <option value="100-500">$100 - $500</option>
                    <option value="500+">$500+</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Sort By</label>
                <select id="sortFilter">
                    <option value="featured">Featured</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="newest">Newest</option>
                </select>
            </div>
        </div>

        <div id="products" class="products">
            <!-- Products will be loaded here -->
        </div>

        <div class="pagination">
            <button class="active">1</button>
            <button>2</button>
            <button>3</button>
            <button>Next</button>
        </div>
    </div>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <span>Shopping Cart</span>
            <button class="close-btn" onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="empty-cart">Your cart is empty</div>
        </div>
        <div class="cart-total" id="cartTotal" style="display:none;">
            <div class="total-label">Total:</div>
            <div class="total-amount" id="cartTotalAmount">$0.00</div>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 LuxeMarket. All rights reserved. | Premium E-Commerce Platform</p>
    </footer>

    <script>
        const sampleProducts = [
            {
                id: 1,
                name: "Premium Wireless Headphones",
                price: 129.99,
                category: "electronics",
                image: "🎧",
                description: "High-quality sound with noise cancellation",
                stock: 15
            },
            {
                id: 2,
                name: "Elegant Watch",
                price: 199.99,
                category: "fashion",
                image: "⌚",
                description: "Classic design with precision movement",
                stock: 8
            },
            {
                id: 3,
                name: "Designer Handbag",
                price: 279.99,
                category: "fashion",
                image: "👜",
                description: "Luxurious leather craftsmanship",
                stock: 5
            },
            {
                id: 4,
                name: "Smart Home Speaker",
                price: 89.99,
                category: "electronics",
                image: "🔊",
                description: "Voice-controlled smart device",
                stock: 20
            },
            {
                id: 5,
                name: "Organic Skincare Set",
                price: 59.99,
                category: "beauty",
                image: "✨",
                description: "Natural ingredients for radiant skin",
                stock: 25
            },
            {
                id: 6,
                name: "Coffee Maker Deluxe",
                price: 149.99,
                category: "home",
                image: "☕",
                description: "Professional-grade brewing technology",
                stock: 12
            },
            {
                id: 7,
                name: "Running Shoes",
                price: 119.99,
                category: "fashion",
                image: "👟",
                description: "Comfortable and lightweight design",
                stock: 30
            },
            {
                id: 8,
                name: "Air Purifier",
                price: 249.99,
                category: "home",
                image: "💨",
                description: "Advanced HEPA filtration system",
                stock: 10
            },
            {
                id: 9,
                name: "Digital Camera",
                price: 599.99,
                category: "electronics",
                image: "📷",
                description: "Professional photography capabilities",
                stock: 7
            },
            {
                id: 10,
                name: "Desk Lamp LED",
                price: 49.99,
                category: "home",
                image: "💡",
                description: "Energy-efficient with adjustable brightness",
                stock: 35
            },
            {
                id: 11,
                name: "Luxury Perfume",
                price: 89.99,
                category: "beauty",
                image: "💐",
                description: "Premium fragrance with lasting scent",
                stock: 18
            },
            {
                id: 12,
                name: "Bluetooth Speaker",
                price: 79.99,
                category: "electronics",
                image: "📢",
                description: "Portable and waterproof design",
                stock: 22
            }
        ];

        let cart = [];
        let currentPage = 1;
        let filteredProducts = [...sampleProducts];

        function renderProducts() {
            const productsContainer = document.getElementById('products');
            productsContainer.innerHTML = '';

            filteredProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                const stockClass = product.stock <= 5 ? 'low' : product.stock === 0 ? 'out' : '';
                const stockText = product.stock === 0 ? 'Out of Stock' : product.stock <= 5 ? 'Low Stock' : 'In Stock';
                
                card.innerHTML = `
                    <div class="product-image">${product.image}</div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-footer">
                            <div class="product-price">$${product.price.toFixed(2)}</div>
                            <span class="stock-status ${stockClass}">${stockText}</span>
                        </div>
                    </div>
                    <button class="add-to-cart" onclick="addToCart(${product.id})" ${product.stock === 0 ? 'disabled' : ''}>
                        Add to Cart
                    </button>
                `;
                productsContainer.appendChild(card);
            });
        }

        function addToCart(productId) {
            const product = sampleProducts.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCart();
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cartCount').textContent = cart.length;
            const cartItemsContainer = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
                cartTotal.style.display = 'none';
                return;
            }

            cartItemsContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">$${item.price.toFixed(2)} × ${item.quantity}</div>
                    </div>
                    <button onclick="removeFromCart(${item.id})" style="background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1.2rem;">×</button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotalAmount').textContent = `$${total.toFixed(2)}`;
            cartTotal.style.display = 'block';
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            filteredProducts = sampleProducts.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.description.toLowerCase().includes(query)
            );
            renderProducts();
        });

        document.getElementById('categoryFilter').addEventListener('change', (e) => {
            const category = e.target.value;
            filteredProducts = category ? sampleProducts.filter(p => p.category === category) : [...sampleProducts];
            renderProducts();
        });

        document.getElementById('sortFilter').addEventListener('change', (e) => {
            const sortBy = e.target.value;
            if (sortBy === 'price-low') {
                filteredProducts.sort((a, b) => a.price - b.price);
            } else if (sortBy === 'price-high') {
                filteredProducts.sort((a, b) => b.price - a.price);
            } else if (sortBy === 'newest') {
                filteredProducts.reverse();
            }
            renderProducts();
        });

        renderProducts();
    </script>
</body>
</html>
